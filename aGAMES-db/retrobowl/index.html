<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Virtual || Retro Bowl</title>
  <link rel="icon" href="../../images/main.png">
  <style>
    body {
      background: #000000;
      color: #ccc;
      margin: 0px;
      padding: 0px;
      border: 0px;
    }
    
    canvas {
      image-rendering: optimizeSpeed;
      -webkit-interpolation-mode: nearest-neighbor;
      margin: 0px;
      padding: 0px;
      border: 0px;
    }

    :-webkit-full-screen #canvas {
      width: 100%;
      height: 100%;
    }

    div.gm4html5_div_class {
      margin: 0px;
      padding: 0px;
      border: 0px;
    }

    div.gm4html5_login {
      padding: 20px;
      position: absolute;
      border: solid 2px #000000;
      background-color: #404040;
      color:#00ff00;
      border-radius: 15px;
      box-shadow: #101010 20px 20px 40px;
    }

    div.gm4html5_cancel_button {float: right}
    div.gm4html5_login_button {float: left}
    div.gm4html5_login_header {text-align: center}

    :-webkit-full-screen {
      width: 100%;
      height: 100%;
    }
  </style>
  <script>
    let inIframe = false;
    try {inIframe = window.self !== window.top} catch {inIframe = true}
    if (inIframe) {alert("Looks like you're accessing Virtual using a third party software. This means features like hide don't work for security reasons & user protection.")}
  </script>
</head>
<body>
  <div class="gm4html5_div_class" id="gm4html5_div_id">
    <img src="html5game/splash.png" id="GM4HTML5_loadingscreen" alt="GameMaker:HTML5 loading screen" style="display:none;"/>
    <canvas id="canvas" width="960" height="540"></canvas>
  </div>

  <script type="text/javascript" src="html5game/RetroBowl.js"></script>
  <script>window.onload = GameMaker_Init;</script>
</body>
</html>
